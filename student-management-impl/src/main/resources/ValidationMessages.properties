# Custom messages for constraint violations.
# These keys are referenced from @Pattern(message="{key}") and @Size(message="{key}").
# Hibernate Validator resolves {key} against this file at runtime.

enrollmentNumber.pattern=Enrollment Number must be a 6-digit number (e.g. 220001).
enrollmentNumber.size=Length of Enrollment Number must be exactly 6 digits.

parentId.pattern=Parent ID must be a 6-digit number (e.g. 220001).
parentId.size=Length of Parent ID must be exactly 6 digits.
