# Path and ID fields
enrollmentNumber.pattern=Enrollment number must be a 6-digit number (e.g. 220001).
enrollmentNumber.size=Enrollment number must be exactly 6 digits.
parentId.pattern=Parent ID must be a 6-digit number (e.g. 220001).
parentId.size=Parent ID must be exactly 6 digits.

# Shared address fields
address.size=Address length must be between 3 and 100 characters.
city.size=City length must be between 3 and 40 characters.
state.size=State length must be between 3 and 40 characters.
zipcode.pattern=Zipcode must contain only digits.
zipcode.size=Zipcode must be exactly 6 digits.

# Student fields
firstName.size=First name length must be between 3 and 20 characters.
lastName.size=Last name length must be between 3 and 20 characters.
email.size=Email length must be between 3 and 40 characters.
phoneNumber.pattern=Phone number must contain only digits.
phoneNumber.size=Phone number must be exactly 10 digits.
gender.pattern=Gender must be one of M, F, or O.
gender.size=Gender must be exactly 1 character.

