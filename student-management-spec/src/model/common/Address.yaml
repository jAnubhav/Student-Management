title: Address
description: Represents a physical address including street, city, state, and postal code details.
type: object
properties:
  address:
    type: string
    description: Street address including house number, building name, or street details.
    x-field-extra-annotation: '@Size(min = 3, max = 100, message = "{address.size}")'
    example: "Flat No. 12B, Sri Lakshmi Apartments, MG Road"

  city:
    type: string
    description: Name of the city where the address is located.
    x-field-extra-annotation: '@Size(min = 3, max = 40, message = "{city.size}")'
    example: "Chennai"

  state:
    type: string
    description: Name of the state or union territory.
    x-field-extra-annotation: '@Size(min = 3, max = 40, message = "{state.size}")'
    example: "Tamil Nadu"

  zipcode:
    type: string
    description: Six-digit Indian postal PIN code corresponding to the address location.
    pattern: '^[0-9]{6}$'
    x-field-extra-annotation: '@Size(min = 6, max = 6, message = "{zipcode.size}")'
    x-pattern-message: "{zipcode.pattern}"
    example: "600034"

example:
  address: "Flat No. 12B, Sri Lakshmi Apartments, MG Road"
  city: "Chennai"
  state: "Tamil Nadu"
  zipcode: "600034"
