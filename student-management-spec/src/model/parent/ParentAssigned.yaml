components:
  schemas:
    ParentAssigned:
      description: Represents the assigned details of a parent or guardian, including their unique enrollment number.
      type: object
      required:
        - parentId
      properties:
        parentId:
          type: string
          minLength: 6
          maxLength: 6
          pattern: '^[0-9]{6}$'
          x-minLength-message: "{parentId.size}"
          x-pattern-message: "{parentId.pattern}"
          description: Unique identifier assigned to the parent.
          example: "220001"

      example:
        parentId: "220001"
