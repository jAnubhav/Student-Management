title: ParentDetailsResponse
description: Represents the response returned when retrieving detailed information about a parent or guardian, including their personal details and contact information.
allOf:
  - $ref: '../common/Utility.yaml#/components/schemas/RequestStatus'
  - type: object
    properties:
      parentDetails:
        description: Contains the details of the parent record, including the assigned parent ID, personal details, and contact information.
        allOf:
          - $ref: './ParentDetails.yaml'

example:
  success:
    summary: Parent details retrieved successfully
    value:
      requestStatus: "SUCCESS"
      parentDetails:
        parentId: "220001"
        fatherName: "Ramesh Sharma"
        fatherEmail: "ramesh.sharma@example.com"
        fatherPhoneNumber: "9876543211"
        motherName: "Sunita Sharma"
        motherEmail: "sunita.sharma@example.com"
        motherPhoneNumber: "9876543212"
        address: "Flat No. 12B, Sri Lakshmi Apartments, MG Road"
        city: "Chennai"
        state: "Tamil Nadu"
        zipcode: "600034"
