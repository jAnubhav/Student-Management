title: CreateStudentResponse
description: Represents the response returned after attempting to create a student record.
allOf:
  - $ref: '../common/Utility.yaml#/components/schemas/RequestStatus'
  - type: object
    required:
      - studentDetails
    properties:
      studentDetails:
        allOf:
          - $ref: './StudentAssigned.yaml#/components/schemas/StudentAssigned'
        description: Contains the details of the student record that was created, including the assigned enrollment number and date of enrollment.

example:
  success:
    summary: Student successfully created
    value:
      requestStatus: "SUCCESS"
      studentDetails:
        enrollmentNumber: "220001"
        dateOfEnrollment: "2024-09-01"
