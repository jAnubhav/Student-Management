                        errorParameter: "fatherPhoneNumber"
                        message: "Father's phone number must contain exactly 10 digits."
                      - type: "INVALID_PARAMETER"
                        errorParameter: "motherEmail"
                        message: "Mother's email must be a valid email address."

        '409':
          description: The request could not be completed because of a resource conflict such as attempting to create a duplicate parent record.
          content:
            application/json:
              schema:
                $ref: '../model/common/Utility.yaml#/components/schemas/FailureResponse'
              examples:
                conflictError:
                  summary: Duplicate parent
                  value:
                    requestStatus: "FAILURE"
                    errors:
                      - type: "CONFLICT"
                        errorParameter: "parentId"
                        message: "A parent with this ID already exists."

        '500':
          description: An unexpected internal server error occurred while processing the request and is not related to client input.
          content:
            application/json:
              schema:
                $ref: '../model/common/Utility.yaml#/components/schemas/FailureResponse'
              examples:
                serverError:
                  summary: Internal server error
                  value:
                    requestStatus: "FAILURE"
                    errors:
                      - type: "INTERNAL_SERVER_ERROR"
                        message: "An unexpected error occurred. Please try again later."

        '503':
          description: The service is temporarily unavailable due to maintenance or system overload and will become available again later.
          content:
            application/json:
              schema:
                $ref: '../model/common/Utility.yaml#/components/schemas/FailureResponse'
              examples:
                serviceUnavailable:
                  summary: Service unavailable
                  value:
                    requestStatus: "FAILURE"
                    errors:
                      - type: "SERVICE_UNAVAILABLE"
                        message: "The service is temporarily unavailable due to maintenance or high load."

