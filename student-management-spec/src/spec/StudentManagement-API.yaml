openapi: 3.0.3

info:
  title: Student Management API
  description: API for managing student lifecycle including creation and retrieval of student records.
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development server environment for testing and development purposes.

tags:
  - name: Student
    description: Operations related to student lifecycle management including creation and retrieval.

paths:
  /student:
    post:
      summary: Create a new student
      operationId: createStudent
      description: Creates a new student record along with associated parent details after performing request validation and business rule verification.
      tags:
        - Student

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../model/student/CreateStudentRequest.yaml'
            examples:
              sampleStudent:
                summary: Valid student creation request
                value:
                  firstName: "Arjun"
                  lastName: "Sharma"
                  email: "arjun.sharma@example.com"
                  phoneNumber: "9876543210"
                  department: "COMPUTER_SCIENCE"
                  gender: "M"
                  dateOfBirth: "2005-08-15"
                  parentId: "220001"
                  address: "Flat No. 12B, Sri Lakshmi Apartments, MG Road"
                  city: "Chennai"
                  state: "Tamil Nadu"
                  zipcode: "600034"

      responses:
        '201':
          description: Student record was successfully validated, created, and persisted in the system.
          content:
            application/json:
              schema:
                $ref: '../model/student/SuccessStudentResponse.yaml'
              examples:
                success:
                  summary: Successful creation
                  value:
                    requestStatus: "SUCCESS"
                    studentDetails:
                      enrollmentNumber: "220001"
                      dateOfEnrollment: "2024-09-01"

        '400':
          description: The request could not be processed due to validation failures, malformed input data, or missing required attributes.
          content:
            application/json:
              schema:
                $ref: '../model/common/Utility.yaml#/components/schemas/FailureResponse'
              examples:
                validationError:
                  summary: Validation errors
                  value:
                    requestStatus: "FAILURE"
                    errors:
                      - type: "INVALID_PARAMETER"
                        errorParameter: "phoneNumber"
                        message: "Phone number must contain exactly 10 digits."
                      - type: "INVALID_PARAMETER"
                        errorParameter: "email"
                        message: "Email must be a valid email address."

        '409':
          description: The request could not be completed because of a resource conflict such as attempting to create a duplicate student record.
          content:
            application/json:
              schema:
                $ref: '../model/common/Utility.yaml#/components/schemas/FailureResponse'
              examples:
                conflictError:
                  summary: Duplicate student
                  value:
                    requestStatus: "FAILURE"
                    errors:
                      - type: "CONFLICT"
                        errorParameter: "enrollmentNumber"
                        message: "A student with this enrollment number already exists."

        '500':
          description: An unexpected internal server error occurred while processing the request and is not related to client input.
          content:
            application/json:
              schema:
                $ref: '../model/common/Utility.yaml#/components/schemas/FailureResponse'
              examples:
                serverError:
                  summary: Internal server error
                  value:
                    requestStatus: "FAILURE"
                    errors:
                      - type: "INTERNAL_SERVER_ERROR"
                        message: "An unexpected error occurred. Please try again later."

        '503':
          description: The service is temporarily unavailable due to maintenance or system overload and will become available again later.
          content:
            application/json:
              schema:
                $ref: '../model/common/Utility.yaml#/components/schemas/FailureResponse'
              examples:
                serviceUnavailable:
                  summary: Service unavailable
                  value:
                    requestStatus: "FAILURE"
                    errors:
                      - type: "SERVICE_UNAVAILABLE"
                        message: "The service is temporarily unavailable due to maintenance or high load."

  /student/{enrollmentNumber}:
    parameters:
      - name: enrollmentNumber
        in: path
        required: true
        description: Unique identifier of the student to be retrieved.
        schema:
          type: string
          pattern: "^[0-9]{6}$"
          example: "220001"

    get:
      summary: Retrieve student details by enrollment number
      operationId: getStudentById
      description: Fetches the details of a student record based on the provided unique identifier after validating the input and ensuring the record exists.
      tags:
        - Student

      responses:
        '200':
          description: Student record was successfully retrieved and returned in the response body.
          content:
            application/json:
              schema:
                $ref: '../model/student/StudentDetailsResponse.yaml'
              examples:
                success:
                  summary: Student details retrieved successfully
                  value:
                    requestStatus: "SUCCESS"
                    studentDetails:
                      enrollmentNumber: "220001"
                      dateOfEnrollment: "2024-09-01"
                      status: "ACTIVE"
                      address: "Flat No. 12B, Sri Lakshmi Apartments, MG Road"
                      city: "Chennai"
                      state: "Tamil Nadu"
                      zipcode: "600034"
                      firstName: "Arjun"
                      lastName: "Sharma"
                      email: "arjun.sharma@example.com"
                      phoneNumber: "9876543210"
                      department: "COMPUTER_SCIENCE"
                      gender: "M"
                      dateOfBirth: "2005-08-15"
                      parentDetails:
                        parentId: "220001"
                        fatherName: "Ramesh Sharma"
                        fatherEmail: "ramesh.sharma@example.com"
                        fatherPhoneNumber: "9876543211"
                        motherName: "Sunita Sharma"
                        motherEmail: "sunita.sharma@example.com"
                        motherPhoneNumber: "9876543212"
                        address: "Flat No. 12B, Sri Lakshmi Apartments, MG Road"
                        city: "Chennai"
                        state: "Tamil Nadu"
                        zipcode: "600034"

        '400':
          description: The request could not be processed due to validation failures or malformed enrollment number format.
          content:
            application/json:
              schema:
                $ref: '../model/common/Utility.yaml#/components/schemas/FailureResponse'
              examples:
                validationError:
                  summary: Validation errors
                  value:
                    requestStatus: "FAILURE"
                    errors:
                      - type: "INVALID_PARAMETER"
                        errorParameter: "enrollmentNumber"
                        message: "Enrollment number must be in valid format."

        '404':
          description: The specified student record was not found in the system.
          content:
            application/json:
              schema:
                $ref: '../model/common/Utility.yaml#/components/schemas/FailureResponse'
              examples:
                notFound:
                  summary: Student record not found
                  value:
                    requestStatus: "FAILURE"
                    errors:
                      - type: "NOT_FOUND"
                        message: "No student record found with the provided enrollment number."

        '500':
          description: An unexpected internal server error occurred while processing the request and is not related to client input.
          content:
            application/json:
              schema:
                $ref: '../model/common/Utility.yaml#/components/schemas/FailureResponse'
              examples:
                serverError:
                  summary: Internal server error
                  value:
                    requestStatus: "FAILURE"
                    errors:
                      - type: "INTERNAL_SERVER_ERROR"
                        message: "An unexpected error occurred. Please try again later."

        '503':
          description: The service is temporarily unavailable due to maintenance or system overload and will become available again later.
          content:
            application/json:
              schema:
                $ref: '../model/common/Utility.yaml#/components/schemas/FailureResponse'
              examples:
                serviceUnavailable:
                  summary: Service unavailable
                  value:
                    requestStatus: "FAILURE"
                    errors:
                      - type: "SERVICE_UNAVAILABLE"
                        message: "The service is temporarily unavailable due to maintenance or high load."

    patch:
      summary: Update existing student details
      operationId: updateStudent
      description: Updates the details of an existing student record based on the provided enrollment number and request body after validating the input and ensuring the record exists.
      tags:
        - Student

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../model/student/UpdateStudentRequest.yaml'
            examples:
              sampleUpdate:
                summary: Valid student update request
                value:
                  address: "D-46, Sector 39"
                  city: "Noida"
                  state: "Uttar Pradesh"
                  zipcode: "201301"

      responses:
        '200':
          description: Student record was successfully updated and the latest details are returned in the response body.
          content:
            application/json:
              schema:
                $ref: '../model/student/SuccessStudentResponse.yaml'
              examples:
                success:
                  summary: Student details updated successfully
                  value:
                    requestStatus: "SUCCESS"
                    studentDetails:
                      enrollmentNumber: "220001"
                      dateOfEnrollment: "2024-09-01"

        '400':
          description: The request could not be processed due to validation failures, malformed input data, or missing required attributes.
          content:
            application/json:
              schema:
                $ref: '../model/common/Utility.yaml#/components/schemas/FailureResponse'
              examples:
                validationError:
                  summary: Validation errors
                  value:
                    requestStatus: "FAILURE"
                    errors:
                      - type: "INVALID_PARAMETER"
                        errorParameter: "zipcode"
                        message: "Zipcode must be a 6-digit number."

        '404':
          description: The specified student record was not found in the system.
          content:
            application/json:
              schema:
                $ref: '../model/common/Utility.yaml#/components/schemas/FailureResponse'
              examples:
                notFound:
                  summary: Student record not found
                  value:
                    requestStatus: "FAILURE"
                    errors:
                      - type: "NOT_FOUND"
                        message: "No student record found with the provided enrollment number."

        '500':
          description: An unexpected internal server error occurred while processing the request and is not related to client input.
          content:
            application/json:
              schema:
                $ref: '../model/common/Utility.yaml#/components/schemas/FailureResponse'
              examples:
                serverError:
                  summary: Internal server error
                  value:
                    requestStatus: "FAILURE"
                    errors:
                      - type: "INTERNAL_SERVER_ERROR"
                        message: "An unexpected error occurred. Please try again later."

        '503':
          description: The service is temporarily unavailable due to maintenance or system overload and will become available again later.
          content:
            application/json:
              schema:
                $ref: '../model/common/Utility.yaml#/components/schemas/FailureResponse'
              examples:
                serviceUnavailable:
                  summary: Service unavailable
                  value:
                    requestStatus: "FAILURE"
                    errors:
                      - type: "SERVICE_UNAVAILABLE"
                        message: "The service is temporarily unavailable due to maintenance or high load."
