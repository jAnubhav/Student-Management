openapi: 3.0.3

info:
  title: Parent Management API
  description: API for managing parent information associated with students including creation and retrieval.
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development server environment for testing and development purposes.

tags:
  - name: Parent
    description: Operations related to managing parent information associated with students.

paths:
  /parent:
    post:
      summary: Create a new parent record
      operationId: createParent
      description: Creates a new parent record in the system after validating the input data and ensuring it meets all required criteria.
      tags:
        - Parent

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../model/parent/CreateParentRequest.yaml'
            examples:
              sampleParent:
                summary: Valid parent creation request
                value:
                  fatherName: "Ramesh Sharma"
                  fatherEmail: "ramesh.sharma@example.com"
                  fatherPhoneNumber: "9876543211"
                  motherName: "Sunita Sharma"
                  motherEmail: "sunita.sharma@example.com"
                  motherPhoneNumber: "9876543212"
                  address: "Flat No. 12B, Sri Lakshmi Apartments, MG Road"
                  city: "Chennai"
                  state: "Tamil Nadu"
                  zipcode: "600034"

      responses:
        '201':
          description: Parent record was successfully validated, created, and persisted in the system.
          content:
            application/json:
              schema:
                $ref: '../model/parent/SuccessParentResponse.yaml'
              examples:
                success:
                  summary: Successful creation
                  value:
                    requestStatus: "SUCCESS"
                    parentDetails:
                      parentId: "220001"

        '400':
          description: The request could not be processed due to validation failures, malformed input data, or missing required attributes.
          content:
            application/json:
              schema:
                $ref: '../model/common/Utility.yaml#/components/schemas/FailureResponse'
              examples:
                validationError:
                  summary: Validation errors
                  value:
                    requestStatus: "FAILURE"
                    errors:
                      - type: "INVALID_PARAMETER"
                        errorParameter: "fatherPhoneNumber"
                        message: "Father's phone number must contain exactly 10 digits."
                      - type: "INVALID_PARAMETER"
                        errorParameter: "motherEmail"
                        message: "Mother's email must be a valid email address."

        '409':
          description: The request could not be completed because of a resource conflict such as attempting to create a duplicate parent record.
          content:
            application/json:
              schema:
                $ref: '../model/common/Utility.yaml#/components/schemas/FailureResponse'
              examples:
                conflictError:
                  summary: Duplicate parent
                  value:
                    requestStatus: "FAILURE"
                    errors:
                      - type: "CONFLICT"
                        errorParameter: "parentId"
                        message: "A parent with this ID already exists."

        '500':
          description: An unexpected internal server error occurred while processing the request and is not related to client input.
          content:
            application/json:
              schema:
                $ref: '../model/common/Utility.yaml#/components/schemas/FailureResponse'
              examples:
                serverError:
                  summary: Internal server error
                  value:
                    requestStatus: "FAILURE"
                    errors:
                      - type: "INTERNAL_SERVER_ERROR"
                        message: "An unexpected error occurred. Please try again later."

        '503':
          description: The service is temporarily unavailable due to maintenance or system overload and will become available again later.
          content:
            application/json:
              schema:
                $ref: '../model/common/Utility.yaml#/components/schemas/FailureResponse'
              examples:
                serviceUnavailable:
                  summary: Service unavailable
                  value:
                    requestStatus: "FAILURE"
                    errors:
                      - type: "SERVICE_UNAVAILABLE"
                        message: "The service is temporarily unavailable due to maintenance or high load."

  /parent/{parentId}:
    parameters:
      - name: parentId
        in: path
        required: true
        description: Unique identifier of the parent to be updated.
        schema:
          type: string
          example: "220001"

    get:
      summary: Retrieve parent details by parent ID
      operationId: getParentById
      description: Fetches the details of a parent record based on the provided unique identifier after validating the input and ensuring the record exists.
      tags:
        - Parent

      responses:
        '200':
          description: Parent record was successfully retrieved and returned in the response body.
          content:
            application/json:
              schema:
                $ref: '../model/parent/ParentDetailsResponse.yaml'
              examples:
                success:
                  summary: Parent details retrieved successfully
                  value:
                    requestStatus: "SUCCESS"
                    parentDetails:
                      parentId: "220001"
                      fatherName: "Ramesh Sharma"
                      fatherEmail: "ramesh.sharma@example.com"
                      fatherPhoneNumber: "9876543211"
                      motherName: "Sunita Sharma"
                      motherEmail: "sunita.sharma@example.com"
                      motherPhoneNumber: "9876543212"
                      address: "Flat No. 12B, Sri Lakshmi Apartments, MG Road"
                      city: "Chennai"
                      state: "Tamil Nadu"
                      zipcode: "600034"

        '400':
          description: The request could not be processed due to validation failures, malformed input data, or missing required attributes.
          content:
            application/json:
              schema:
                $ref: '../model/common/Utility.yaml#/components/schemas/FailureResponse'
              examples:
                validationError:
                  summary: Validation errors
                  value:
                    requestStatus: "FAILURE"
                    errors:
                      - type: "INVALID_PARAMETER"
                        errorParameter: "parentId"
                        message: "Parent ID must be in valid format."

        '404':
          description: The specified parent record was not found in the system.
          content:
            application/json:
              schema:
                $ref: '../model/common/Utility.yaml#/components/schemas/FailureResponse'
              examples:
                notFound:
                  summary: Parent record not found
                  value:
                    requestStatus: "FAILURE"
                    errors:
                      - type: "NOT_FOUND"
                        message: "No parent record found with the provided parent ID."

        '500':
          description: An unexpected internal server error occurred while processing the request and is not related to client input.
          content:
            application/json:
              schema:
                $ref: '../model/common/Utility.yaml#/components/schemas/FailureResponse'
              examples:
                serverError:
                  summary: Internal server error
                  value:
                    requestStatus: "FAILURE"
                    errors:
                      - type: "INTERNAL_SERVER_ERROR"
                        message: "An unexpected error occurred. Please try again later."

        '503':
          description: The service is temporarily unavailable due to maintenance or system overload and will become available again later.
          content:
            application/json:
              schema:
                $ref: '../model/common/Utility.yaml#/components/schemas/FailureResponse'
              examples:
                serviceUnavailable:
                  summary: Service unavailable
                  value:
                    requestStatus: "FAILURE"
                    errors:
                      - type: "SERVICE_UNAVAILABLE"
                        message: "The service is temporarily unavailable due to maintenance or high load."

    patch:
      summary: Update parent details by parent ID
      operationId: updateParentById
      description: Updates the details of a parent record based on the provided unique identifier after validating the input and ensuring the record exists.
      tags:
          - Parent

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../model/parent/UpdateParentRequest.yaml'
            examples:
              updateAddress:
                summary: Valid parent update request
                value:
                  address: "D-46, Sector 39"
                  city: "Noida"
                  state: "Uttar Pradesh"
                  zipcode: "201301"

      responses:
        '200':
          description: Parent record was successfully updated and the updated details are returned in the response body.
          content:
            application/json:
              schema:
                $ref: '../model/parent/SuccessParentResponse.yaml'
              examples:
                success:
                  summary: Parent details updated successfully
                  value:
                    requestStatus: "SUCCESS"
                    parentDetails:
                      parentId: "220001"

        '400':
          description: The request could not be processed due to validation failures, malformed input data, or missing required attributes.
          content:
            application/json:
              schema:
                $ref: '../model/common/Utility.yaml#/components/schemas/FailureResponse'
              examples:
                validationError:
                  summary: Validation errors
                  value:
                    requestStatus: "FAILURE"
                    errors:
                      - type: "INVALID_PARAMETER"
                        errorParameter: "zipcode"
                        message: "Zipcode must be a 6-digit number."

        '404':
          description: The specified parent record was not found in the system.
          content:
            application/json:
              schema:
                $ref: '../model/common/Utility.yaml#/components/schemas/FailureResponse'
              examples:
                notFound:
                  summary: Parent record not found
                  value:
                    requestStatus: "FAILURE"
                    errors:
                      - type: "NOT_FOUND"
                        message: "No parent record found with the provided parent ID."

        '500':
          description: An unexpected internal server error occurred while processing the request and is not related to client input.
          content:
            application/json:
              schema:
                $ref: '../model/common/Utility.yaml#/components/schemas/FailureResponse'
              examples:
                serverError:
                  summary: Internal server error
                  value:
                    requestStatus: "FAILURE"
                    errors:
                      - type: "INTERNAL_SERVER_ERROR"
                        message: "An unexpected error occurred. Please try again later."

        '503':
          description: The service is temporarily unavailable due to maintenance or system overload and will become available again later.
          content:
            application/json:
              schema:
                $ref: '../model/common/Utility.yaml#/components/schemas/FailureResponse'
              examples:
                serviceUnavailable:
                  summary: Service unavailable
                  value:
                    requestStatus: "FAILURE"
                    errors:
                      - type: "SERVICE_UNAVAILABLE"
                        message: "The service is temporarily unavailable due to maintenance or high load."
